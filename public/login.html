<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in - AI Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #fafaf9;
      --bg-bottom: #d6d3d1;
      --grid: rgba(15, 23, 42, 0.045);
      --card: #ffffff;
      --line: #e7e5e4;
      --line-soft: #f0efed;
      --txt: #0a0a0a;
      --mut: #737373;
      --mut-soft: #a3a3a3;
      --acc: #0a0a0a;
      --acc-hover: #1f1f1f;
      --err: #dc2626;
      --field-bg-soft: #fafaf9;
      --shadow-pill: 0 1px 2px rgba(15, 23, 42, 0.04), 0 4px 12px rgba(15, 23, 42, 0.04);
      --shadow-card: 0 1px 0 rgba(15, 23, 42, 0.02), 0 8px 32px rgba(15, 23, 42, 0.08);
      --shadow-focus: 0 0 0 3px rgba(10, 10, 10, 0.07);
    }
    * { box-sizing: border-box; }
    html {
      min-height: 100%;
      background-color: var(--bg);
      background-image: linear-gradient(to bottom, var(--bg) 0%, var(--bg-bottom) 100%);
      background-repeat: no-repeat;
      background-size: 100% 100%;
    }
    body {
      margin: 0;
      font: 15px/1.55 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      color: var(--txt);
      background-color: transparent;
      background-image:
        linear-gradient(var(--grid) 1px, transparent 1px),
        linear-gradient(90deg, var(--grid) 1px, transparent 1px);
      background-size: 56px 56px;
      background-position: -1px -1px;
      background-repeat: repeat;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    .login-card {
      width: 100%;
      max-width: 420px;
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 18px;
      padding: 36px 32px 32px;
      box-shadow: var(--shadow-card);
      text-align: center;
    }

    .tag {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 6px 14px; margin-bottom: 22px;
      background: var(--card); border: 1px solid var(--line);
      border-radius: 999px; font-size: 13px; color: var(--mut);
      box-shadow: var(--shadow-pill);
    }
    .tag b { color: var(--txt); font-weight: 600; }

    h1 {
      font-size: 32px; line-height: 1.1; letter-spacing: -0.025em;
      margin: 0 0 8px; font-weight: 700;
    }
    .sub {
      color: var(--mut); margin: 0 0 24px;
      font-size: 14.5px;
    }

    button.google-btn {
      width: 100%;
      background: var(--card); color: var(--txt);
      border: 1px solid var(--line); border-radius: 10px;
      padding: 12px 14px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      transition: background .15s, border-color .15s, transform .05s;
    }
    button.google-btn:hover { background: var(--field-bg-soft); border-color: var(--mut-soft); }
    button.google-btn:active { transform: translateY(1px); }

    .divider {
      display: flex; align-items: center; gap: 12px;
      margin: 18px 0;
      color: var(--mut-soft); font-size: 12.5px; font-weight: 500;
      text-transform: lowercase; letter-spacing: 0.05em;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: var(--line-soft);
    }

    form { display: flex; flex-direction: column; gap: 10px; }
    input {
      width: 100%; padding: 12px 14px;
      background: var(--card); border: 1px solid var(--line);
      border-radius: 10px;
      color: var(--txt); font-size: 14.5px;
      font-family: inherit;
      transition: border-color .15s, box-shadow .15s;
    }
    input:focus {
      outline: none; border-color: var(--txt);
      box-shadow: var(--shadow-focus);
    }
    input::placeholder { color: var(--mut-soft); }

    button.primary {
      margin-top: 6px;
      background: var(--acc); color: #fff;
      border: 0; border-radius: 10px;
      padding: 13px 14px;
      font-size: 15px; font-weight: 600;
      cursor: pointer; font-family: inherit;
      letter-spacing: -0.005em;
      transition: background .15s, transform .05s;
    }
    button.primary:hover:not(:disabled) { background: var(--acc-hover); }
    button.primary:active:not(:disabled) { transform: translateY(1px); }
    button.primary:disabled { opacity: .5; cursor: default; }

    .msg {
      margin-top: 12px; font-size: 13px; min-height: 18px;
      color: var(--err); text-align: center;
    }
    .foot {
      margin-top: 22px; font-size: 12.5px; color: var(--mut);
      text-align: center;
    }
    .foot a { color: var(--txt); text-decoration: underline;
      text-underline-offset: 2px; text-decoration-color: var(--mut-soft); }
    .foot a:hover { text-decoration-color: var(--txt); }

    @media (max-width: 480px) {
      .login-card { padding: 28px 22px; }
      h1 { font-size: 28px; }
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="tag" data-i18n-html="tag"><b>Your personal AI</b> · on your own server</div>

    <h1 data-i18n="h1">Sign in</h1>
    <p class="sub" data-i18n="sub">Welcome back to your AI Assistant panel.</p>

    <form id="loginForm" autocomplete="on">
      <input id="username" type="text"     name="username" placeholder="Username" data-i18n-ph="usernamePh" autocomplete="username"         required />
      <input id="password" type="password" name="password" placeholder="Password" data-i18n-ph="passwordPh" autocomplete="current-password" required />
      <button class="primary" type="submit" data-i18n="signIn">Sign in</button>
      <div class="msg" id="msg" aria-live="polite"></div>
    </form>
  </div>

  <script>
    const $ = (id) => document.getElementById(id);

    // English-only strings. The i18n machinery is kept (single `en` dictionary)
    // so markup with data-i18n* hooks keeps working; the language switcher was
    // removed - English is the default and only language.
    const I18N = {
      en: {
        title: 'Sign in - AI Assistant',
        tag: '<b>Your personal AI</b> · on your own server',
        h1: 'Sign in',
        sub: 'Welcome back to your AI Assistant panel.',
        usernamePh: 'Username',
        passwordPh: 'Password',
        signIn: 'Sign in',
        errInvalid: 'Invalid username or password.',
        errNoBackend: 'Backend not reachable (local preview).',
      },
    };
    const currentLang = 'en';

    function applyI18n() {
      const dict = I18N.en;
      document.documentElement.lang = 'en';
      document.title = dict.title;
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const v = dict[el.dataset.i18n]; if (v != null) el.textContent = v;
      });
      document.querySelectorAll('[data-i18n-html]').forEach(el => {
        const v = dict[el.dataset.i18nHtml]; if (v != null) el.innerHTML = v;
      });
      document.querySelectorAll('[data-i18n-ph]').forEach(el => {
        const v = dict[el.dataset.i18nPh]; if (v != null) el.placeholder = v;
      });
    }
    applyI18n();

    // Form is wired against /login (POST) on the backend; until that endpoint
    // exists, this just shows a placeholder error so the UI is testable.
    $('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = $('loginForm').querySelector('button.primary');
      const msg = $('msg');
      msg.textContent = '';
      btn.disabled = true;
      const body = { username: $('username').value, password: $('password').value };
      try {
        const r = await fetch('/login', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(body),
        });
        if (r.ok) { window.location = '/'; return; }
        const data = await r.json().catch(() => ({}));
        msg.textContent = data.error || I18N[currentLang].errInvalid;
      } catch (_) {
        msg.textContent = I18N[currentLang].errNoBackend;
      } finally {
        btn.disabled = false;
      }
    });
  </script>
</body>
</html>
